<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>家庭訪問・個人懇談 日程調整アプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <style>
    /* -------------------------------------
       CSS: Base & Typography
    -------------------------------------- */
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'M PLUS Rounded 1c', sans-serif;
      /* 爽やかなグラデーション背景 */
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      color: #333;
    }

    /* -------------------------------------
       CSS: App Container & Glassmorphism
    -------------------------------------- */
    .app-container {
      width: 95%;
      max-width: 1400px;
      height: 90vh;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* -------------------------------------
       CSS: Header & Tabs
    -------------------------------------- */
    header {
      padding: 20px 30px;
      background: rgba(255, 255, 255, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      color: #2c3e50;
    }
    .tabs {
      display: flex;
      gap: 10px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      color: #666;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .tab-btn.active {
      background: #4caf50;
      color: white;
      box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
    }
    .tab-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.9);
    }

    /* -------------------------------------
       CSS: Main Area & Content
    -------------------------------------- */
    main {
      flex: 1;
      overflow: hidden; /* コンテンツ内でスクロールさせる */
      position: relative;
    }
    .tab-content {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 20px;
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.4s ease-in-out;
    }
    .tab-content.active {
      display: flex;
      opacity: 1;
      z-index: 10;
    }

    /* 設定タブのレイアウト（横スクロール） */
    .settings-wrapper {
      flex: 1;
      display: flex;
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 10px;
    }
    /* スクロールバーの装飾 */
    .settings-wrapper::-webkit-scrollbar, .schedule-wrapper::-webkit-scrollbar {
      height: 10px; width: 10px;
    }
    .settings-wrapper::-webkit-scrollbar-thumb, .schedule-wrapper::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 5px;
    }

    /* クラス別テーブルコンテナ */
    .class-box {
      min-width: 420px; /* 兄弟情報が分かれた分、少し広げる */
      background: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.8);
      height: fit-content;
    }
    .class-box h3 {
      margin-top: 0;
      text-align: center;
      color: #34495e;
      border-bottom: 2px solid rgba(0,0,0,0.1);
      padding-bottom: 10px;
    }

    /* スケジュールタブのレイアウト */
    .schedule-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto; /* 横スクロールを許可 */
      background: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.8);
    }

    /* -------------------------------------
       CSS: Tables & Inputs
    -------------------------------------- */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-bottom: 10px;
    }
    th, td {
      padding: 8px 4px;
      text-align: left;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    th {
      font-size: 0.9rem;
      color: #555;
    }
    td.num-col {
      width: 30px;
      text-align: center;
      font-weight: bold;
      color: #7f8c8d;
    }
    input[type="text"], input[type="number"], select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 6px;
      font-family: inherit;
      background: rgba(255,255,255,0.8);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      outline: none;
      border-color: #4caf50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
    }
    /* エラー時のハイライト */
    input.error-input {
      border: 2px solid #e74c3c !important;
      background: rgba(231, 76, 60, 0.1) !important;
    }

    .readonly-text {
      display: flex;
      align-items: center;
      padding: 8px;
      background: rgba(0,0,0,0.03);
      border-radius: 6px;
      color: #555;
      min-height: 44px; /* 2人分の高さに合わせて広げる */
      white-space: pre-wrap; /* 縦に改行して表示できるようにする */
      line-height: 1.4;
      overflow: hidden;
    }

    /* -------------------------------------
       CSS: Buttons & Footer
    -------------------------------------- */
    .btn-container {
      display: flex;
      justify-content: flex-end;
      padding-top: 15px;
    }
    .save-btn {
      padding: 12px 30px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
    }
    .save-btn:hover {
      background: #2980b9;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(52, 152, 219, 0.4);
    }

    footer {
      padding: 15px 30px;
      background: rgba(255, 255, 255, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      text-align: right;
    }
    .danger-btn {
      padding: 8px 16px;
      background: transparent;
      color: #e74c3c;
      border: 1px solid #e74c3c;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: 0.2s;
    }
    .danger-btn:hover {
      background: #e74c3c;
      color: white;
    }
    
    /* レスポンシブ対応 */
    @media (max-width: 768px) {
      .app-container { height: 95vh; width: 100%; border-radius: 0; }
      header { flex-direction: column; gap: 10px; }
      .class-box { min-width: 280px; }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <div style="display: flex; align-items: center;">
        <h1>🏠 家庭訪問・個人懇談 日程調整</h1>
        <!-- 日程表用のクラス選択プルダウン（タイトルの横） -->
        <select id="schedule-class-select" style="font-size: 1rem; padding: 4px 8px; margin-left: 20px; display: none; width: auto; font-weight: bold; border: 2px solid rgba(0,0,0,0.2);" onchange="renderSchedule()">
          <!-- JSで動的生成 -->
        </select>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-target="tab-settings">設定表</button>
        <button class="tab-btn" data-target="tab-schedule">日程表</button>
      </div>
    </header>

    <main>
      <!-- タブ1: 設定表 -->
      <section id="tab-settings" class="tab-content active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <div style="color: #555; font-size: 0.9rem;">
            💡 兄弟情報は <strong>「◯年」「◯組」「名前」</strong> に分けて入力してください。保存時に自動で相互リンクされます。
          </div>
          <div style="display: flex; gap: 15px; align-items: center;">
            <!-- クラス追加UI -->
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="number" id="new-class-year" placeholder="年" min="1" max="6" style="width: 60px;">
              <span>年</span>
              <input type="number" id="new-class-num" placeholder="組" min="1" max="10" style="width: 60px;">
              <span>組</span>
              <button class="tab-btn" style="padding: 6px 15px; font-size: 0.9rem;" onclick="addNewClass()">➕ 追加</button>
            </div>
            <!-- 移動した保存ボタン -->
            <button class="save-btn" style="padding: 8px 20px; font-size: 1rem;" onclick="saveSettings()">💾 設定を保存して反映</button>
          </div>
        </div>
        
        <div class="settings-wrapper" id="settings-wrapper">
          <!-- JSでクラスごとのテーブルを生成 -->
        </div>
      </section>

      <!-- タブ2: 日程表 -->
      <section id="tab-schedule" class="tab-content">
        <div style="margin-bottom: 10px; color: #555; font-size: 0.9rem;">
          💡 タイトル横のプルダウンでクラスを選んでください。児童名を入力・選択すると兄弟情報が自動的に表示されます。（横スクロールで5日間入力可能です）
        </div>
        <div class="schedule-wrapper">
          <table style="min-width: 1500px;"> <!-- クラス選択が消えて幅が減った分調整 -->
            <thead>
              <tr id="schedule-header-row1">
                <!-- JSで動的生成 -->
              </tr>
              <tr id="schedule-header-row2">
                <!-- JSで動的生成 -->
              </tr>
            </thead>
            <tbody id="schedule-tbody">
              <!-- JSでスケジュール行を生成 -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <footer>
  <button onclick="openAuthModal()" style="padding: 8px 16px; background: white; color: #333;">アカウント設定</button>
  
  <button onclick="saveToFirebase()" style="padding: 8px 16px; background: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
    ☁️ クラウドに保存（同期）
  </button>
  
  <button id="reset-btn" class="danger-btn">🔄 すべてのデータをリセット（初めから）</button>
</footer>
  </div>

  <!-- アカウント設定モーダル -->
  <div class="modal-overlay" id="auth-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px);">
    <div class="modal-content" style="background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
      <h2 style="margin-top: 0; color: #2c3e50;">アカウント設定</h2>
      <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">
        メールアドレスを登録すると、別のパソコンやスマホからでも同じデータにアクセスできるようになります。
      </p>
      
      <div style="margin-bottom: 15px;">
        <label style="display: block; font-size: 0.8rem; margin-bottom: 5px;">メールアドレス</label>
        <input type="email" id="auth-email" placeholder="example@mail.com" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
      </div>
      
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-size: 0.8rem; margin-bottom: 5px;">パスワード</label>
        <input type="password" id="auth-pw" placeholder="6文字以上" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
      </div>
      
      <div style="display: flex; gap: 10px;">
        <button class="save-btn" style="flex: 1; background: #4caf50;" onclick="handleSignUp()">新規登録</button>
        <button class="save-btn" style="flex: 1; background: #3498db;" onclick="handleLogin()">ログイン</button>
      </div>
      
      <button onclick="closeAuthModal()" style="width: 100%; margin-top: 15px; border: none; background: none; color: #aaa; cursor: pointer; font-size: 0.9rem;">閉じる</button>
    </div>
  </div>

  <script>
    /* -------------------------------------
       初期設定・データ構造
    -------------------------------------- */
    const STORAGE_KEY_SETTINGS = 'homeVisitSettingsData_v2'; 
    const STORAGE_KEY_SCHEDULE = 'homeVisitScheduleData_v3';
    const STORAGE_KEY_NO_VISIT = 'homeVisitNoVisitData_v1'; // 追加
    
    // 表示するクラスのリスト（初期設定は各学年1組まで）
    let classNames = ["1年1組", "2年1組", "3年1組", "4年1組", "5年1組", "6年1組"];
    const maxStudentsPerClass = 40; // 40番まで
    
    // 時間枠の生成 (13:30 ~ 17:00 まで 10分刻み)
    const timeSlots = [];
    let hour = 13, min = 30;
    while (hour < 17 || (hour === 17 && min === 0)) {
      timeSlots.push(`${hour}:${min.toString().padStart(2, '0')}`);
      min += 10;
      if(min >= 60) { min = 0; hour++; }
    }

    let settingsData = {};
    let scheduleData = {}; 
    let noVisitData = {}; // 追加

    // 効果音 (Googleのフリー音源を使用)
    const soundSuccess = new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg');
    const soundError = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

    /* -------------------------------------
       初期化処理
    -------------------------------------- */
    function init() {
      // 設定データの読み込み
      const savedSettings = localStorage.getItem(STORAGE_KEY_SETTINGS);
      if (savedSettings) {
        settingsData = JSON.parse(savedSettings);
        classNames = Object.keys(settingsData);
        // 並び替え (1年1組, 1年2組... の順)
        classNames.sort((a, b) => {
           const matchA = a.match(/(\d+)年(\d+)組/);
           const matchB = b.match(/(\d+)年(\d+)組/);
           if(matchA && matchB) {
              if(matchA[1] !== matchB[1]) return parseInt(matchA[1]) - parseInt(matchB[1]);
              return parseInt(matchA[2]) - parseInt(matchB[2]);
           }
           return 0;
        });
      } else {
        classNames.forEach(cls => {
          settingsData[cls] = generateEmptyClass();
        });
      }

      // 「家庭訪問を希望しない」データの読み込み
      const savedNoVisit = localStorage.getItem(STORAGE_KEY_NO_VISIT);
      if (savedNoVisit) {
         noVisitData = JSON.parse(savedNoVisit);
      }
      classNames.forEach(cls => {
         if (!noVisitData[cls]) noVisitData[cls] = [""]; // 初期で1枠
      });

      // スケジュールデータの読み込み (クラス別・5日分)
      const savedSchedule = localStorage.getItem(STORAGE_KEY_SCHEDULE);
      if (savedSchedule) {
        scheduleData = JSON.parse(savedSchedule);
        // 新しいクラスが追加されていた場合の補完、および時間枠の拡張対応
        classNames.forEach(cls => {
          if (!scheduleData[cls]) {
            scheduleData[cls] = generateEmptySchedule();
          } else {
            for(let d = 0; d < 5; d++){
              if (!scheduleData[cls][d]) scheduleData[cls][d] = [];
              while(scheduleData[cls][d].length < timeSlots.length) {
                scheduleData[cls][d].push({ time: timeSlots[scheduleData[cls][d].length], studentName: "", siblings: "" });
              }
            }
          }
        });
      } else {
        classNames.forEach(cls => {
          scheduleData[cls] = generateEmptySchedule();
        });
      }

      updateScheduleClassSelect();
      setupDatalist();
      renderSettings();
      updateScheduleSiblings(); // ロード時に再計算しつつ renderSchedule() も実行される
      setupTabs();
      setupResetButton();
    }

    function generateEmptyClass() {
      let arr = [];
      for(let i = 1; i <= maxStudentsPerClass; i++) {
        arr.push({ number: i, name: "", sibYear: "", sibClass: "", sibName: "" });
      }
      return arr;
    }

    function generateEmptySchedule() {
      let schedule = [];
      for(let d = 0; d < 5; d++){
        let daySlots = [];
        timeSlots.forEach(time => {
          daySlots.push({ time: time, studentName: "", siblings: "" });
        });
        schedule.push(daySlots);
      }
      return schedule;
    }

    /* -------------------------------------
       クラス選択プルダウンの更新
    -------------------------------------- */
    function updateScheduleClassSelect() {
      const select = document.getElementById('schedule-class-select');
      const currentVal = select.value;
      select.innerHTML = classNames.map(c => `<option value="${c}">${c}</option>`).join('');
      if (classNames.includes(currentVal)) {
         select.value = currentVal;
      } else if (classNames.length > 0) {
         select.value = classNames[0];
      }
    }

    /* -------------------------------------
       クラス追加処理
    -------------------------------------- */
    function addNewClass() {
      const year = document.getElementById('new-class-year').value;
      const num = document.getElementById('new-class-num').value;
      
      if (!year || !num) {
        alert("追加する「年」と「組」を入力してください。");
        return;
      }
      
      const newCls = `${year}年${num}組`;
      if (classNames.includes(newCls)) {
        alert("そのクラスはすでに存在します。");
        return;
      }

      // 現在の入力状態を同期しておく
      syncDOMtoSettings();

      // 新規追加
      classNames.push(newCls);
      // 再度ソート
      classNames.sort((a, b) => {
         const matchA = a.match(/(\d+)年(\d+)組/);
         const matchB = b.match(/(\d+)年(\d+)組/);
         if(matchA && matchB) {
            if(matchA[1] !== matchB[1]) return parseInt(matchA[1]) - parseInt(matchB[1]);
            return parseInt(matchA[2]) - parseInt(matchB[2]);
         }
         return 0;
      });
      settingsData[newCls] = generateEmptyClass();
      scheduleData[newCls] = generateEmptySchedule(); // スケジュールも新規作成
      noVisitData[newCls] = [""]; // 追加
      
      localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settingsData));
      localStorage.setItem(STORAGE_KEY_SCHEDULE, JSON.stringify(scheduleData));
      localStorage.setItem(STORAGE_KEY_NO_VISIT, JSON.stringify(noVisitData));
      
      document.getElementById('new-class-year').value = '';
      document.getElementById('new-class-num').value = '';
      
      updateScheduleClassSelect();
      renderSettings();
      renderSchedule(); 
    }

    /* -------------------------------------
       クラス削除処理
    -------------------------------------- */
    function deleteClass(clsToRemove) {
      if (confirm(`本当に「${clsToRemove}」を削除しますか？\n入力されているデータもすべて消去されます。`)) {
         syncDOMtoSettings(); // 現在の入力状態を保存
         
         classNames = classNames.filter(c => c !== clsToRemove);
         delete settingsData[clsToRemove];
         delete scheduleData[clsToRemove];
         delete noVisitData[clsToRemove];
         
         localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settingsData));
         localStorage.setItem(STORAGE_KEY_SCHEDULE, JSON.stringify(scheduleData));
         localStorage.setItem(STORAGE_KEY_NO_VISIT, JSON.stringify(noVisitData));
         
         updateScheduleClassSelect();
         renderSettings();
         renderSchedule();
      }
    }

    // DOMの入力値を内部データに同期する関数
    function syncDOMtoSettings() {
      const nameInputs = document.querySelectorAll('.setting-name');
      const sibYearInputs = document.querySelectorAll('.setting-sib-year');
      const sibClassInputs = document.querySelectorAll('.setting-sib-class');
      const sibNameInputs = document.querySelectorAll('.setting-sib-name');
      
      nameInputs.forEach((input, i) => {
        const cls = input.dataset.class;
        const idx = input.dataset.idx;
        settingsData[cls][idx].name = input.value;
        settingsData[cls][idx].sibYear = sibYearInputs[i].value;
        settingsData[cls][idx].sibClass = sibClassInputs[i].value;
        settingsData[cls][idx].sibName = sibNameInputs[i].value;
      });
    }

    // 氏名が入力されたとき、他のクラスで兄弟として指定されていれば自動補完する
    function autoFillSibling(inputElem) {
      const myName = inputElem.value.trim();
      if (!myName) return;
      
      const myClass = inputElem.dataset.class;
      const myMatch = myClass.match(/^(\d+)年(\d+)組$/);
      if (!myMatch) return;
      const myYear = myMatch[1];
      const myClassNum = myMatch[2];

      const myRow = inputElem.closest('tr');
      const sibYearInput = myRow.querySelector('.setting-sib-year');
      const sibClassInput = myRow.querySelector('.setting-sib-class');
      const sibNameInput = myRow.querySelector('.setting-sib-name');

      // 既に兄弟情報が手入力されている場合は上書きしない
      if (sibYearInput.value || sibClassInput.value || sibNameInput.value) return;

      // 現在の画面の入力を一旦データに同期させる
      syncDOMtoSettings();

      let foundSibling = null;
      for (const cls of classNames) {
        for (const s of settingsData[cls]) {
          // 相手の兄弟情報が自分を指しているかチェック
          if (s.name.trim() && String(s.sibYear) === String(myYear) && String(s.sibClass) === String(myClassNum) && s.sibName.trim() === myName) {
             const sibMatch = cls.match(/^(\d+)年(\d+)組$/);
             if (sibMatch) {
                foundSibling = {
                  year: sibMatch[1],
                  classNum: sibMatch[2],
                  name: s.name.trim()
                };
                break;
             }
          }
        }
        if (foundSibling) break;
      }

      // 見つかったら画面の入力欄に反映し、データを同期
      if (foundSibling) {
        sibYearInput.value = foundSibling.year;
        sibClassInput.value = foundSibling.classNum;
        sibNameInput.value = foundSibling.name;
        
        syncDOMtoSettings();
      }
    }

    /* -------------------------------------
       UI描画: 設定表
    -------------------------------------- */
    function renderSettings() {
      const wrapper = document.getElementById('settings-wrapper');
      wrapper.innerHTML = '';

    -------------------------------------- */
    function saveSettings() {
      // DOMから現在の入力を取得して更新
      syncDOMtoSettings();

      // 双方向リンクの構築処理
      applyBiDirectionalLinks();

      // データの保存とUI更新

      setupDatalist();
      renderSettings();
      updateScheduleSiblings(); // スケジュール側の兄弟情報も最新化して保存

      soundSuccess.currentTime = 0; soundSuccess.play().catch(()=>{});
    }

    // 双方向リンクのコアアルゴリズム
    function applyBiDirectionalLinks() {
      const allStudents = [];
      // 登録されている全生徒をフラットなリスト化
      classNames.forEach(cls => {
        settingsData[cls].forEach(s => {
          if (s.name.trim() && s.sibYear && s.sibClass && s.sibName.trim()) {
             // 自身の「年」と「組」を抽出
             const myMatch = cls.match(/^(\d+)年(\d+)組$/);
             if(myMatch) {
               allStudents.push({ 
                 myYear: myMatch[1], 
                 myClass: myMatch[2], 
                 myName: s.name.trim(),
                 targetYear: s.sibYear,
                 targetClass: s.sibClass,
                 targetName: s.sibName.trim()
               });
             }
          }
        });
      });

      // 抽出したリンク情報を対象の児童に反映
      allStudents.forEach(link => {
        const targetCls = `${link.targetYear}年${link.targetClass}組`;
        
        // 対象クラスが存在しない場合は自動作成
        if (!settingsData[targetCls]) {
           settingsData[targetCls] = generateEmptyClass();
           scheduleData[targetCls] = generateEmptySchedule();
           noVisitData[targetCls] = [""];
           if(!classNames.includes(targetCls)) {
               classNames.push(targetCls);
               // ソート維持
               classNames.sort((a, b) => {
                 const matchA = a.match(/(\d+)年(\d+)組/);
                 const matchB = b.match(/(\d+)年(\d+)組/);
                 if(matchA && matchB) {
                    if(matchA[1] !== matchB[1]) return parseInt(matchA[1]) - parseInt(matchB[1]);
                    return parseInt(matchA[2]) - parseInt(matchB[2]);
                 }
                 return 0;
              });
              updateScheduleClassSelect();
           }
        }

        // 対象クラス内に指定された名前の児童がいるか検索
        let targetStudent = settingsData[targetCls].find(s => s.name.trim() === link.targetName);

        // 児童が見つかった場合、兄弟情報を追加（空の時のみ）
        if (targetStudent) {
          if (!targetStudent.sibYear && !targetStudent.sibClass && !targetStudent.sibName) {
            targetStudent.sibYear = link.myYear;
            targetStudent.sibClass = link.myClass;
            targetStudent.sibName = link.myName;
          }
        }
      });
    }

    // 指定されたクラス・日時において、他クラスで予定されている兄弟を検索する
    function findSiblingSchedules(currentClass, d, tIdx) {
      let siblingsStr = [];
      classNames.forEach(otherCls => {
        if (otherCls === currentClass) return;
        if (scheduleData[otherCls] && scheduleData[otherCls][d] && scheduleData[otherCls][d][tIdx]) {
          const otherStudentName = scheduleData[otherCls][d][tIdx].studentName.trim();
          if (otherStudentName) {
            // その児童が、currentClassの誰かの兄弟であるかチェック
            if (checkIsSibling(currentClass, otherCls, otherStudentName)) {
               siblingsStr.push(`${otherCls} ${otherStudentName}`);
            }
          }
        }
      });
      return siblingsStr.join('\n'); // 縦に改行して表示する
    }

    // currentClassの児童一覧の中に、otherClassのotherStudentNameを兄弟として持っている児童がいるか判定
    function checkIsSibling(currentClass, otherClass, otherStudentName) {
      if(!settingsData[currentClass]) return false;
      
      const otherMatch = otherClass.match(/^(\d+)年(\d+)組$/);
      if(!otherMatch) return false;
      const otherYear = otherMatch[1];
      const otherClassNum = otherMatch[2];

      for (const student of settingsData[currentClass]) {
        if (student.name.trim() !== '') {
           if (String(student.sibYear) === String(otherYear) && 
               String(student.sibClass) === String(otherClassNum) && 
               student.sibName.trim() === otherStudentName) {
               return true;
           }
        }
      }
      return false;
    }

    // 設定が更新された時にすべてのクラスのスケジュール側も最新状態にする
    function updateScheduleSiblings() {
      classNames.forEach(cls => {
        if(scheduleData[cls]){
          for(let d = 0; d < 5; d++){
            if(scheduleData[cls][d]){
               scheduleData[cls][d].forEach((item, tIdx) => {
                 if(item) item.siblings = findSiblingSchedules(cls, d, tIdx);
               });
            }
          }
        }
      });
      renderSchedule();
      saveScheduleData();
    }

    // 未入力の児童を算出して表示を更新する関数
    function updateUnenteredStudentsDisplay() {
      const currentClass = document.getElementById('schedule-class-select').value;
      if (!currentClass || !settingsData[currentClass]) return;

      const currentClassStudents = settingsData[currentClass].filter(s => s.name.trim() !== '').map(s => s.name.trim());

      const scheduledStudents = [];
      if (scheduleData[currentClass]) {
        for(let d = 0; d < 5; d++){
          if(scheduleData[currentClass][d]) {
            scheduleData[currentClass][d].forEach(item => {
              if(item && item.studentName.trim() !== '') {
                scheduledStudents.push(item.studentName.trim());
              }
            });
          }
        }
      }

      const noVisitStudents = (noVisitData[currentClass] || []).filter(name => name.trim() !== '').map(name => name.trim());

      const allEnteredStudents = [...scheduledStudents, ...noVisitStudents];
      const unenteredStudents = currentClassStudents.filter(name => !allEnteredStudents.includes(name));

      const unenteredDisplay = document.getElementById('unentered-students-display');
      if (unenteredDisplay) {
        if(unenteredStudents.length > 0) {
           unenteredDisplay.textContent = unenteredStudents.join('　');
           unenteredDisplay.style.color = '#e74c3c'; // 赤色
        } else {
           unenteredDisplay.textContent = "全員入力済み";
           unenteredDisplay.style.color = "#27ae60"; // 緑色
        }
      }
    }

          console.error("認証エラー:", error);
          if (error.code === 'auth/configuration-not-found') {
            alert("Firebaseコンソールで「Authentication > Sign-in method > 匿名(Anonymous)」を有効にしてください。");
          }
        }
      };
      initAuth();

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          const docRef = doc(db, "artifacts", appId, "users", user.uid, "data", "main");
          const snap = await getDoc(docRef);
          
          if (snap.exists()) {
            const data = snap.data();
            // 元のアプリの変数名に合わせて流し込む
            if (data.settings) settingsData = data.settings;
            if (data.schedule) scheduleData = data.schedule;
            if (data.noVisit) noVisitData = data.noVisit;
            if (data.settings) {
                classNames = Object.keys(settingsData).sort((a, b) => {
                   const matchA = a.match(/(\d+)年(\d+)組/);
                   const matchB = b.match(/(\d+)年(\d+)組/);
                   if(matchA && matchB) {
                      if(matchA[1] !== matchB[1]) return parseInt(matchA[1]) - parseInt(matchB[1]);
                      return parseInt(matchA[2]) - parseInt(matchB[2]);
                   }
                   return 0;
                });
            }
          }
          // ロード後にUIを再描画する関数
          init(); 
        }
      });

        // 4. 保存前に兄弟情報の自動リンクを実行 (※既存の完成版関数を利用)
        applyBiDirectionalLinks();

        const dataToSave = {

        };

        try {

        } catch (e) {
          console.error("保存エラー:", e);
          alert("保存に失敗しました。");
        }
      };

      // 既存の「保存ボタン」関数をフックし、元の保存後にFirebase保存を走らせる
      const originalSaveSettings = saveSettings;
      window.saveSettings = function() {
        if(originalSaveSettings) originalSaveSettings();
        window.saveToFirebase();
      };

          console.error("モーダルが見つかりません。HTMLにID='auth-modal'があるか確認してください。");

      };
